<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Brute Force AI</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0;}
        .login-box { background: white; padding: 20px 30px 30px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 340px; }
        h2 { text-align: center; color: #333; margin-bottom: 5px;}
        .info { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px;}
        select, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; font-size: 14px;}
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; font-size: 15px; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body>

<div class="login-box">
    <h2>Simulasi Middleware</h2>
    <div class="info">Sistem Pendeteksi Intrusi AI Berbasis Perilaku</div>
    
    <select id="skenario">
        <option value="normal">Skenario 1: Karyawan Sah (Normal Login)</option>
        <option value="brute_force">Skenario 2: Serangan Hacker (Brute Force)</option>
    </select>
    
    <button onclick="kirimDataAI()">Kirim Log ke AI</button>
    <div id="status">Status AI: Menunggu interaksi...</div>
</div>

<script>
    async function kirimDataAI() {
        const skenario = document.getElementById("skenario").value;
        const statusBox = document.getElementById("status");

        statusBox.style.color = "black";
        statusBox.innerText = "AI sedang menganalisis log...";

        let dataJaringan = {};

        // Menyuntikkan data yang 100% valid sesuai Dataset Kaggle
        if (skenario === "brute_force") {
            dataJaringan = {
                "source_ip": "203.0.113.84",
                "username": "root",
                "event_type": "Failed password",
                "status": "auth_fail"
            };
        } else {
            dataJaringan = {
                "source_ip": "192.168.0.46",
                "username": "john_doe",
                "event_type": "Accepted password",
                "status": "success"
            };
        }

        try {
            const response = await fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataJaringan)
            });

            const result = await response.json();
            
            // Menangkap dan menampilkan pesan error murni dari Python (Mencegah tulisan undefined)
            if (result.status === "error") {
                statusBox.style.color = "orange";
                statusBox.innerText = "⚠️ ERROR PYTHON: " + result.pesan;
                return;
            }

            // Eksekusi warna berdasarkan prediksi
            if(result.prediksi === "brute_force") {
                statusBox.style.color = "red";
                statusBox.style.backgroundColor = "#ffe6e6";
                statusBox.innerText = "🚨 BLOKIR: Indikasi Brute Force!";
            } else if (result.prediksi === "normal") {
                statusBox.style.color = "green";
                statusBox.style.backgroundColor = "#e6ffe6";
                statusBox.innerText = "✅ AKSES DIBERIKAN: Aktivitas Normal";
            }
        } catch (error) {
            statusBox.style.color = "red";
            statusBox.innerText = "Server AI (Flask) belum menyala!";
        }
    }
</script>

</body>
</html>
